services:
  caddy:
    image: caddy:2.10-alpine
    container_name: healthcare-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?PUBLIC_DOMAIN is required}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?LETSENCRYPT_EMAIL is required}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
    networks:
      - healthcare-internal

  postgres:
    image: postgres:16-alpine
    container_name: healthcare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_db}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare} -d ${POSTGRES_DB:-healthcare_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-internal

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: healthcare-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_db}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare123}
      SCHEDULE: ${POSTGRES_BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${POSTGRES_BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${POSTGRES_BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${POSTGRES_BACKUP_KEEP_MONTHS:-6}
      BACKUP_DIR: /backups
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-internal

  backend:
    image: ghcr.io/${GHCR_REPOSITORY:?GHCR_REPOSITORY is required}-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: healthcare-backend
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-healthcare_db}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-healthcare}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-healthcare123}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-internal

  frontend:
    image: ghcr.io/${GHCR_REPOSITORY:?GHCR_REPOSITORY is required}-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: healthcare-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - healthcare-internal

volumes:
  postgres_data:
  postgres_backups:
  caddy_data:
  caddy_config:

networks:
  healthcare-internal:
    driver: bridge
