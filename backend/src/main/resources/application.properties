# Database (defaults to H2, can be overridden for PostgreSQL in Docker/production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration

# H2 Console (enabled only when using H2)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# IMPORTANT
spring.sql.init.mode=never
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:ThisIsADevelopmentJwtSecretKeyAtLeast32CharsLong!}
jwt.expiration-minutes=240
jwt.refresh-expiration-days=14

# Security
security.ratelimit.auth.max-requests-per-minute=20

# Monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
