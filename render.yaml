services:
  - type: web
    name: healthcare-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        value: jdbc:${DATABASE_URL}
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: healthcare-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: healthcare-db
          property: password
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: SPRING_H2_CONSOLE_ENABLED
        value: "false"
      - key: SPRING_FLYWAY_ENABLED
        value: "true"
      - key: SPRING_FLYWAY_BASELINE_ON_MIGRATE
        value: "true"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: healthcare-db
    databaseName: healthcare_db
    user: healthcare_user
    plan: free
