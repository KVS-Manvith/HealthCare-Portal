services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_db}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare} -d ${POSTGRES_DB:-healthcare_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: healthcare-backend
    environment:
      JWT_SECRET: ${JWT_SECRET:-ReplaceThisWithAProper32PlusCharacterSecretKey}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-healthcare_db}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-healthcare}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-healthcare123}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_H2_CONSOLE_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: healthcare-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
