name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (for example: latest or v1.0.0)
        required: true
        default: latest
      deploy_path:
        description: Absolute path on target server where compose files live
        required: true
        default: /opt/healthcare-portal

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deployment files
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ github.event.inputs.deploy_path }}/infra/caddy'"
          rsync -az docker-compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ github.event.inputs.deploy_path }}/docker-compose.prod.yml"
          rsync -az infra/caddy/Caddyfile \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ github.event.inputs.deploy_path }}/infra/caddy/Caddyfile"

      - name: Deploy on remote host
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
            set -euo pipefail
            cd "${{ github.event.inputs.deploy_path }}"
            export IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            docker compose -f docker-compose.prod.yml --env-file .env.production ps
          EOF
